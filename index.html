<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herberk vsázky</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #222;
      --accent: #c8ff00;
      --text: #e8e8e8;
      --muted: #555;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,255,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,255,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    header {
      margin-bottom: 60px;
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 10vw, 96px);
      line-height: 0.95;
      letter-spacing: 0.02em;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.2s;
    }

    h1 span {
      color: var(--accent);
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin-top: 28px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.35s;
    }

    /* Vsázky list */
    .vsazky-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.5s;
    }

    .vsazky-list li {
      border: 1px solid var(--border);
      transition: border-color 0.2s, background 0.2s;
    }

    .vsazky-list li:hover {
      border-color: var(--accent);
      background: rgba(200,255,0,0.04);
    }

    .vsazky-list a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      text-decoration: none;
      color: var(--text);
      font-size: 13px;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }

    .vsazky-list li:hover a {
      color: var(--accent);
    }

    .vsazky-list a .filename {
      font-weight: 400;
    }

    .vsazky-list a .arrow {
      font-size: 16px;
      color: var(--muted);
      transition: color 0.2s, transform 0.2s;
    }

    .vsazky-list li:hover a .arrow {
      color: var(--accent);
      transform: translateX(4px);
    }

    .index-num {
      color: var(--muted);
      font-size: 10px;
      margin-right: 16px;
      min-width: 20px;
    }

    .left {
      display: flex;
      align-items: center;
    }

    footer {
      margin-top: 60px;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.7s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <p class="label">Přehled sázek</p>
      <h1>Herberk<br><span>vsázky</span></h1>
      <div class="divider"></div>
    </header>

    <ul class="vsazky-list">
      <li>
        <a href="vsazka-moravec-3.html">
          <span class="left">
            <span class="index-num">01</span>
            <span class="filename">vsazka-moravec-3.html</span>
          </span>
          <span class="arrow">→</span>
        </a>
      </li>
            <li>
        <a href="vsazka-moravec-3.html">
          <span class="left">
            <span class="index-num">02</span>
            <span class="filename">Moravec</span>
          </span>
          <span class="arrow">→</span>
        </a>
      </li>
      <!-- Další vsázky přidej sem ve stejném formátu -->
    </ul>

    <footer>Herberk &copy; 2025</footer>
  </div>
</body>
</html>
