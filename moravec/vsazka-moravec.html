<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsázka — Moravec</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F2EB;
    --surface: #FFFFFF;
    --surface2: #EDE9E0;
    --ink: #1A1612;
    --ink2: #6B6560;
    --ink3: #A09A92;
    --accent: #D4402A;
    --accent-light: #FAE8E5;
    --gold: #C9920A;
    --gold-light: #FDF3DC;
    --green: #2A7A4A;
    --green-light: #E3F5EC;
    --border: rgba(26,22,18,0.1);
    --border-strong: rgba(26,22,18,0.2);
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  header {
    background: var(--ink);
    color: #F5F2EB;
    padding: 2rem 2.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }

  .header-left h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .header-left p {
    font-size: 0.875rem;
    color: rgba(245,242,235,0.5);
    margin-top: 4px;
    font-weight: 400;
    font-family: 'DM Mono', monospace;
  }

  .header-badge {
    background: var(--accent);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    white-space: nowrap;
  }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* ── LOAD SCREEN ── */
  .load-screen {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 3rem 2rem;
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .load-icon {
    width: 56px; height: 56px;
    background: var(--surface2);
    border-radius: 50%;
    margin: 0 auto 1.25rem;
    display: flex; align-items: center; justify-content: center;
  }

  .load-icon svg { width: 24px; height: 24px; }

  .load-title {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }

  .load-sub {
    font-size: 0.82rem;
    color: var(--ink3);
    font-family: 'DM Mono', monospace;
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .load-sub code {
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--ink2);
  }

  .btn-load {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 44px;
    padding: 0 24px;
    background: var(--ink);
    color: #F5F2EB;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-load:hover { opacity: 0.82; }

  .btn-reload {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 36px;
    padding: 0 14px;
    background: transparent;
    color: var(--ink3);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-reload:hover { background: var(--surface2); color: var(--ink2); }

  input[type="file"] { display: none; }

  /* ── FILE INFO BAR ── */
  .file-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 1.5rem;
    font-size: 0.82rem;
    font-family: 'DM Mono', monospace;
    color: var(--ink2);
  }

  .file-bar .file-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .file-bar .file-name { flex: 1; }

  /* ── RESULT INPUT ── */
  .result-input-card {
    background: var(--ink);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .result-input-card label {
    font-size: 0.85rem;
    font-weight: 600;
    color: rgba(245,242,235,0.7);
    white-space: nowrap;
    flex-shrink: 0;
  }

  input[type="number"] {
    width: 100%;
    height: 40px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: var(--radius-sm);
    padding: 0 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    color: #F5F2EB;
    outline: none;
    transition: background 0.15s, border-color 0.15s;
  }

  input[type="number"]::placeholder { color: rgba(245,242,235,0.3); }
  input[type="number"]:focus { background: rgba(255,255,255,0.12); border-color: rgba(245,242,235,0.4); }

  /* ── CHART ── */
  .viz-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 12px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.25rem 1rem;
    margin-bottom: 1.5rem;
  }

  .chart-wrap { position: relative; height: 280px; }

  /* ── RESULTS ── */
  .empty-state {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--ink3);
    font-size: 0.875rem;
    font-weight: 500;
  }

  .winner-card {
    background: var(--gold-light);
    border: 1px solid rgba(201,146,10,0.2);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .winner-trophy {
    width: 44px; height: 44px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }

  .winner-info .name { font-size: 1.1rem; font-weight: 800; color: var(--gold); letter-spacing: -0.01em; }
  .winner-info .detail { font-size: 0.8rem; color: rgba(201,146,10,0.8); font-family: 'DM Mono', monospace; margin-top: 2px; }

  .results-list-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink3); margin: 1.5rem 0 10px;
  }

  .rank-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
    transition: border-color 0.15s;
  }
  .rank-card:hover { border-color: var(--border-strong); }

  .rank-num {
    font-size: 0.75rem; font-weight: 700;
    font-family: 'DM Mono', monospace;
    color: var(--ink3); width: 24px; flex-shrink: 0; text-align: center;
  }

  .player-details { flex: 1; min-width: 0; }
  .player-details .pname { font-size: 0.95rem; font-weight: 700; color: var(--ink); }
  .player-details .pstats { font-size: 0.78rem; color: var(--ink3); font-family: 'DM Mono', monospace; margin-top: 2px; }

  .los-grid { display: flex; gap: 6px; flex-shrink: 0; }

  .los-pill {
    display: flex; flex-direction: column; align-items: center;
    padding: 6px 10px; border-radius: var(--radius-sm); min-width: 52px;
  }

  .los-pill .num { font-size: 1.1rem; font-weight: 800; line-height: 1; font-family: 'DM Mono', monospace; }
  .los-pill .lbl { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 3px; opacity: 0.7; }

  .pill-buys { background: var(--accent-light); color: var(--accent); }
  .pill-gets { background: var(--green-light); color: var(--green); }
  .pill-net-pos { background: var(--green-light); color: var(--green); }
  .pill-net-neg { background: var(--accent-light); color: var(--accent); }
  .pill-net-zero { background: var(--surface2); color: var(--ink2); }

  .owes-row {
    padding: 6px 0 4px 36px; font-size: 0.78rem; color: var(--ink3);
    display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
  }

  .owes-to-label { font-weight: 600; margin-right: 2px; }

  .owes-chip {
    background: var(--accent-light); color: var(--accent);
    border-radius: 100px; padding: 2px 10px;
    font-size: 0.75rem; font-weight: 600;
  }

  .section-divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

  /* ── TABLE ── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: auto;
    margin-bottom: 1.25rem;
  }

  .data-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; min-width: 520px; }

  .data-table th {
    padding: 0.6rem 1rem; text-align: left;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink3);
    background: var(--surface2); border-bottom: 1px solid var(--border);
  }

  .data-table th.right, .data-table td.right { text-align: right; }

  .data-table td {
    padding: 0.7rem 1rem; border-bottom: 1px solid var(--border);
    vertical-align: middle; color: var(--ink);
  }

  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr.winner-row td { background: var(--gold-light); }
  .data-table tr:hover td { background: var(--surface2); }
  .data-table tr.winner-row:hover td { background: #FAF0CC; }

  .td-mono { font-family: 'DM Mono', monospace; font-size: 0.82rem; }
  .td-rank { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--ink3); font-weight: 700; width: 36px; }

  .badge {
    display: inline-block; border-radius: 100px;
    padding: 2px 10px; font-size: 0.72rem; font-weight: 700;
  }

  .badge-green { background: var(--green-light); color: var(--green); }
  .badge-red { background: var(--accent-light); color: var(--accent); }
  .badge-gray { background: var(--surface2); color: var(--ink2); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #F5F2EB;
    padding: 10px 20px; border-radius: 100px;
    font-size: 0.85rem; font-weight: 600;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; white-space: nowrap; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--accent); }

  @media (max-width: 480px) {
    header { padding: 1.5rem 1.25rem; flex-direction: column; align-items: flex-start; }
    main { padding: 1.5rem 1rem 3rem; }
    .los-grid { gap: 4px; }
    .los-pill { min-width: 44px; padding: 5px 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Sledující<br>Moravce</h1>
    <p>Vsázka / vyhodnocení losů</p>
  </div>
  <div class="header-badge">Tip contest</div>
</header>

<main>

  <!-- Load screen — visible before file is loaded -->
  <div class="load-screen" id="load-screen">
    <div class="load-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#A09A92" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <line x1="9" y1="15" x2="12" y2="12"/>
        <line x1="15" y1="15" x2="12" y2="12"/>
      </svg>
    </div>
    <div class="load-title">Načti soubor s tipy</div>
    <div class="load-sub">
      Vyber soubor <code>tipy.txt</code> ze stejného adresáře.<br>
      Formát: každý řádek <code>Jméno,Tip</code> (např. <code>Tomáš,12500</code>)
    </div>
    <button class="btn-load" onclick="pickFile()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 1v9M5 7l3-3 3 3M1 11v1.5A2.5 2.5 0 003.5 15h9A2.5 2.5 0 0015 12.5V11"/>
      </svg>
      Otevřít tipy.txt
    </button>
    <input type="file" id="file-input" accept=".txt,.csv" onchange="handleFileInput(event)" />
  </div>

  <!-- App — visible after file is loaded -->
  <div id="app" style="display:none">

    <div class="file-bar">
      <div class="file-dot"></div>
      <span class="file-name" id="file-name-label">tipy.txt</span>
      <button class="btn-reload" onclick="pickFile()" title="Načíst jiný soubor">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 6.5A5.5 5.5 0 1012 6.5"/>
          <polyline points="8.5 1 12 1 12 4.5"/>
        </svg>
        Změnit soubor
      </button>
    </div>

    <div id="chart-section" style="display:none; margin-bottom:1.5rem;">
      <div class="viz-label">Graf tipů</div>
      <div class="chart-card">
        <div class="chart-wrap"><canvas id="tips-chart"></canvas></div>
      </div>
    </div>

    <div class="result-input-card">
      <label for="real-value">Skutečný výsledek:</label>
      <input type="number" id="real-value" placeholder="zadej počet sledujících" oninput="recalculate()" />
    </div>

    <div id="results"></div>

  </div>

</main>

<div class="toast" id="toast"></div>

<script>
let players = [];
let chartInstance = null;

const COLORS = ["#D4402A","#C9920A","#2A7A4A","#378ADD","#7F77DD","#D4537E","#1D9E75","#D85A30"];

// ── FILE LOADING ──

function pickFile() {
  document.getElementById("file-input").click();
}

function handleFileInput(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = "";
  const reader = new FileReader();
  reader.onload = (ev) => loadText(ev.target.result, file.name);
  reader.onerror = () => showToast("Soubor se nepodařilo načíst.", true);
  reader.readAsText(file, "UTF-8");
}

function loadText(text, filename) {
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim() && !l.trim().startsWith("#"));

  // Skip header row if first line has no numeric second column
  let dataLines = lines;
  if (lines.length > 0) {
    const parts = lines[0].split(/[,;	]/).map(s => s.trim());
    if (parts.length >= 2 && isNaN(parseFloat(parts[1]))) {
      dataLines = lines.slice(1);
    }
  }

  const parsed = dataLines
    .map(line => {
      const parts = line.split(/[,;	]/).map(s => s.trim());
      return { name: parts[0] || "", tip: parts[1] || "" };
    })
    .filter(p => p.name && p.tip !== "" && !isNaN(parseFloat(p.tip)));

  if (parsed.length === 0) {
    showToast("Žádná platná data v souboru. Zkontroluj formát (Jméno,Tip).", true);
    return;
  }

  players = parsed.map(p => ({ name: p.name, tip: parseFloat(p.tip) }));

  document.getElementById("load-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("file-name-label").textContent = filename + " — " + players.length + " hráčů";
  document.getElementById("real-value").value = "";

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  recalculate();
  showToast("Načteno " + players.length + " hráčů ✓");
}

// ── CORE LOGIC ──

function fmt(n) { return Math.round(n).toLocaleString("cs-CZ"); }

function getValid() { return [...players]; }

function recalculate() {
  updateChart();
  updateResults();
}

function updateChart() {
  const valid = getValid();
  const realVal = parseFloat(document.getElementById("real-value").value);
  const hasReal = !isNaN(realVal);

  if (valid.length < 1) {
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    document.getElementById("chart-section").style.display = "none";
    return;
  }

  document.getElementById("chart-section").style.display = "block";

  const byTip = [...valid].sort((a, b) => a.tip - b.tip);

  let winnerName = null;
  if (hasReal) {
    const withDiff = valid.map(p => ({ ...p, diff: Math.abs(p.tip - realVal) }));
    withDiff.sort((a, b) => a.diff - b.diff);
    winnerName = withDiff[0].name;
  }

  const datasets = [
    {
      label: "Tip hráče",
      data: byTip.map(p => p.tip),
      backgroundColor: byTip.map((p, i) =>
        (winnerName && p.name === winnerName ? "#C9920A" : COLORS[i % COLORS.length]) + "CC"
      ),
      borderColor: byTip.map(p => winnerName && p.name === winnerName ? "#C9920A" : "transparent"),
      borderWidth: 2,
      borderRadius: 6,
      borderSkipped: false,
    }
  ];

  if (hasReal) {
    datasets.push({
      label: "Skutečný výsledek",
      data: Array(byTip.length).fill(realVal),
      type: "line",
      borderColor: "#1A1612",
      borderWidth: 2,
      borderDash: [6, 4],
      pointRadius: 0,
      fill: false,
      tension: 0,
      order: 0,
    });
  }

  const labels = byTip.map(p => p.name);

  if (chartInstance) {
    chartInstance.data.labels = labels;
    chartInstance.data.datasets = datasets;
    chartInstance.update();
  } else {
    chartInstance = new Chart(document.getElementById("tips-chart").getContext("2d"), {
      type: "bar",
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 300 },
        plugins: {
          legend: {
            position: "bottom",
            labels: {
              font: { family: "'Syne', sans-serif", size: 12, weight: "600" },
              color: "#6B6560", boxWidth: 12, boxHeight: 12, padding: 16,
            }
          },
          tooltip: {
            callbacks: {
              label: (ctx) => {
                if (ctx.dataset.type === "line") return " Skutečnost: " + fmt(ctx.raw);
                const p = byTip[ctx.dataIndex];
                if (hasReal) return " " + p.name + ": " + fmt(ctx.raw) + " (odch. " + fmt(Math.abs(p.tip - realVal)) + ")";
                return " " + p.name + ": " + fmt(ctx.raw);
              }
            },
            titleFont: { family: "'Syne', sans-serif", weight: "700" },
            bodyFont: { family: "'DM Mono', monospace", size: 12 },
            backgroundColor: "#1A1612", padding: 12, cornerRadius: 8,
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { font: { family: "'Syne', sans-serif", size: 12, weight: "700" }, color: "#1A1612" },
            border: { display: false }
          },
          y: {
            grid: { color: "rgba(26,22,18,0.06)" },
            ticks: {
              font: { family: "'DM Mono', monospace", size: 11 },
              color: "#A09A92",
              callback: v => v.toLocaleString("cs-CZ"),
            },
            border: { display: false }
          }
        }
      }
    });
  }
}

function updateResults() {
  const realVal = parseFloat(document.getElementById("real-value").value);
  const section = document.getElementById("results");
  const valid = getValid();

  if (isNaN(realVal)) {
    section.innerHTML = valid.length >= 2
      ? `<p class="empty-state">Zadej skutečný výsledek pro vyhodnocení.</p>`
      : `<p class="empty-state">Načti soubor s tipy a zadej skutečný výsledek.</p>`;
    return;
  }

  const ranked = valid.map(p => ({
    ...p,
    diff: Math.abs(p.tip - realVal)
  })).sort((a, b) => a.diff - b.diff);

  const n = ranked.length;

  let html = `
    <div class="winner-card">
      <div class="winner-trophy">🏆</div>
      <div class="winner-info">
        <div class="name">${ranked[0].name} vyhrál!</div>
        <div class="detail">tip: ${fmt(ranked[0].tip)} · odchylka: ${fmt(ranked[0].diff)}</div>
      </div>
    </div>
    <div class="results-list-label">Pořadí a losování</div>
  `;

  ranked.forEach((p, i) => {
    const buys = i, receives = n - 1 - i, net = receives - buys;
    const netClass = net > 0 ? "pill-net-pos" : net < 0 ? "pill-net-neg" : "pill-net-zero";
    const netLabel = net > 0 ? "+" + net : "" + net;
    const owesHtml = i > 0
      ? `<div class="owes-row"><span class="owes-to-label">Kupuje los:</span>${ranked.slice(0, i).map(r => `<span class="owes-chip">${r.name}</span>`).join("")}</div>`
      : "";

    html += `
      <div>
        <div class="rank-card">
          <div class="rank-num">${i + 1}.</div>
          <div class="player-details">
            <div class="pname">${p.name}</div>
            <div class="pstats">tip: ${fmt(p.tip)} · odch: ${fmt(p.diff)}</div>
          </div>
          <div class="los-grid">
            <div class="los-pill pill-buys"><span class="num">${buys}</span><span class="lbl">kupuje</span></div>
            <div class="los-pill pill-gets"><span class="num">${receives}</span><span class="lbl">dostane</span></div>
            <div class="los-pill ${netClass}"><span class="num">${netLabel}</span><span class="lbl">bilance</span></div>
          </div>
        </div>
        ${owesHtml}
      </div>
    `;
  });

  html += `
    <hr class="section-divider">
    <div class="viz-label">Tabulka výsledků</div>
    <div class="table-card">
      <table class="data-table">
        <thead>
          <tr>
            <th class="td-rank right">#</th>
            <th>Hráč</th>
            <th class="right">Tip</th>
            <th class="right">Skutečnost</th>
            <th class="right">Odchylka</th>
            <th class="right">Kupuje</th>
            <th class="right">Dostane</th>
            <th class="right">Bilance</th>
          </tr>
        </thead>
        <tbody>
  `;

  ranked.forEach((p, i) => {
    const buys = i, receives = n - 1 - i, net = receives - buys;
    const netLabel = net > 0 ? "+" + net : "" + net;
    const netBadge = net > 0 ? "badge-green" : net < 0 ? "badge-red" : "badge-gray";
    html += `
      <tr class="${i === 0 ? "winner-row" : ""}">
        <td class="td-rank right">${i + 1}.</td>
        <td><strong>${p.name}</strong></td>
        <td class="td-mono right">${fmt(p.tip)}</td>
        <td class="td-mono right">${fmt(realVal)}</td>
        <td class="td-mono right">${fmt(p.diff)}</td>
        <td class="right">${buys}</td>
        <td class="right">${receives}</td>
        <td class="right"><span class="badge ${netBadge}">${netLabel}</span></td>
      </tr>
    `;
  });

  html += `</tbody></table></div>`;
  section.innerHTML = html;
}

// ── TOAST ──

function showToast(msg, isError) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isError ? " error" : "");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = "toast"; }, 3000);
}
</script>
</body>
</html>
