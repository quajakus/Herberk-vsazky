<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsázka — losování</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F2EB;
    --surface: #FFFFFF;
    --surface2: #EDE9E0;
    --ink: #1A1612;
    --ink2: #6B6560;
    --ink3: #A09A92;
    --accent: #D4402A;
    --accent-light: #FAE8E5;
    --gold: #C9920A;
    --gold-light: #FDF3DC;
    --green: #2A7A4A;
    --green-light: #E3F5EC;
    --border: rgba(26,22,18,0.1);
    --border-strong: rgba(26,22,18,0.2);
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--ink);
    color: #F5F2EB;
    padding: 2rem 2.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }

  .header-left h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .header-left p {
    font-size: 0.875rem;
    color: rgba(245,242,235,0.5);
    margin-top: 4px;
    font-weight: 400;
    font-family: 'DM Mono', monospace;
  }

  .header-badge {
    background: var(--accent);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    white-space: nowrap;
  }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  .section-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 12px;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 1.25rem;
  }

  .card-header {
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .card-header-title {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink2);
  }

  .players-container { padding: 1rem 1.25rem; }

  .player-row {
    display: grid;
    grid-template-columns: 1fr 150px 32px;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  input[type="text"], input[type="number"] {
    width: 100%;
    height: 40px;
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    padding: 0 12px;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }

  input[type="text"]::placeholder, input[type="number"]::placeholder { color: var(--ink3); }
  input[type="text"]:focus, input[type="number"]:focus { background: #fff; border-color: var(--accent); }
  input[type="number"] { font-family: 'DM Mono', monospace; font-size: 0.85rem; }

  .btn-remove {
    width: 32px; height: 32px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--ink3);
    transition: all 0.15s; flex-shrink: 0;
  }
  .btn-remove:hover { background: #FAE8E5; border-color: var(--accent); color: var(--accent); }

  .btn-add {
    width: 100%; height: 40px;
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius-sm);
    background: transparent; cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 600;
    color: var(--ink3); letter-spacing: 0.04em; margin-top: 10px;
    transition: all 0.15s;
  }
  .btn-add:hover { background: var(--surface2); color: var(--ink2); border-color: var(--ink3); }

  .result-input-card {
    background: var(--ink);
    border-radius: var(--radius);
    padding: 1.25rem; margin-bottom: 2rem;
    display: flex; align-items: center; gap: 1rem;
  }

  .result-input-card label {
    font-size: 0.85rem; font-weight: 600;
    color: rgba(245,242,235,0.7); white-space: nowrap; flex-shrink: 0;
  }

  .result-input-card input {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.15);
    color: #F5F2EB; flex: 1;
  }

  .result-input-card input::placeholder { color: rgba(245,242,235,0.3); }
  .result-input-card input:focus { background: rgba(255,255,255,0.12); border-color: rgba(245,242,235,0.4); }

  .empty-state {
    text-align: center; padding: 2.5rem 1rem;
    color: var(--ink3); font-size: 0.875rem; font-weight: 500;
  }

  .winner-card {
    background: var(--gold-light);
    border: 1px solid rgba(201,146,10,0.2);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem; margin-bottom: 1.25rem;
    display: flex; align-items: center; gap: 14px;
  }

  .winner-trophy {
    width: 44px; height: 44px; background: var(--gold);
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 22px; flex-shrink: 0;
  }

  .winner-info .name { font-size: 1.1rem; font-weight: 800; color: var(--gold); letter-spacing: -0.01em; }
  .winner-info .detail { font-size: 0.8rem; color: rgba(201,146,10,0.8); font-family: 'DM Mono', monospace; margin-top: 2px; }

  .results-list-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink3); margin: 1.5rem 0 10px;
  }

  .rank-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px; transition: border-color 0.15s;
  }
  .rank-card:hover { border-color: var(--border-strong); }

  .rank-num {
    font-size: 0.75rem; font-weight: 700; font-family: 'DM Mono', monospace;
    color: var(--ink3); width: 24px; flex-shrink: 0; text-align: center;
  }

  .player-details { flex: 1; min-width: 0; }
  .player-details .pname { font-size: 0.95rem; font-weight: 700; color: var(--ink); }
  .player-details .pstats { font-size: 0.78rem; color: var(--ink3); font-family: 'DM Mono', monospace; margin-top: 2px; }

  .los-grid { display: flex; gap: 6px; flex-shrink: 0; }

  .los-pill {
    display: flex; flex-direction: column; align-items: center;
    padding: 6px 10px; border-radius: var(--radius-sm); min-width: 52px;
  }

  .los-pill .num { font-size: 1.1rem; font-weight: 800; line-height: 1; font-family: 'DM Mono', monospace; }
  .los-pill .lbl { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 3px; opacity: 0.7; }

  .pill-buys { background: var(--accent-light); color: var(--accent); }
  .pill-gets { background: var(--green-light); color: var(--green); }
  .pill-net-pos { background: var(--green-light); color: var(--green); }
  .pill-net-neg { background: var(--accent-light); color: var(--accent); }
  .pill-net-zero { background: var(--surface2); color: var(--ink2); }

  .owes-row {
    padding: 6px 0 4px 36px; font-size: 0.78rem; color: var(--ink3);
    display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
  }

  .owes-to-label { font-weight: 600; margin-right: 2px; }

  .owes-chip {
    background: var(--accent-light); color: var(--accent);
    border-radius: 100px; padding: 2px 10px; font-size: 0.75rem; font-weight: 600;
  }

  .section-divider {
    border: none; border-top: 1px solid var(--border); margin: 2.5rem 0 2rem;
  }

  /* ── CHART ── */
  .viz-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink3); margin-bottom: 12px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.25rem 1rem;
    margin-bottom: 1.25rem;
  }

  .chart-wrap { position: relative; height: 280px; }

  /* ── TABLE ── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: auto;
    margin-bottom: 1.25rem;
  }

  .table-card-title {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink3);
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .data-table {
    width: 100%; border-collapse: collapse; font-size: 0.875rem;
    min-width: 520px;
  }

  .data-table th {
    padding: 0.6rem 1rem; text-align: left;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink3);
    background: var(--surface2); border-bottom: 1px solid var(--border);
  }

  .data-table th.right, .data-table td.right { text-align: right; }

  .data-table td {
    padding: 0.7rem 1rem; border-bottom: 1px solid var(--border);
    vertical-align: middle; color: var(--ink);
  }

  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr.winner-row td { background: var(--gold-light); }
  .data-table tr:hover td { background: var(--surface2); }
  .data-table tr.winner-row:hover td { background: #FAF0CC; }

  .td-mono { font-family: 'DM Mono', monospace; font-size: 0.82rem; }
  .td-rank { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--ink3); font-weight: 700; width: 36px; }

  .badge {
    display: inline-block; border-radius: 100px;
    padding: 2px 10px; font-size: 0.72rem; font-weight: 700;
  }

  .badge-green { background: var(--green-light); color: var(--green); }
  .badge-red { background: var(--accent-light); color: var(--accent); }
  .badge-gray { background: var(--surface2); color: var(--ink2); }

  @media (max-width: 480px) {
    header { padding: 1.5rem 1.25rem; flex-direction: column; align-items: flex-start; }
    main { padding: 1.5rem 1rem 3rem; }
    .los-grid { gap: 4px; }
    .los-pill { min-width: 44px; padding: 5px 8px; }
  }

  /* ── IMPORT ── */
  .import-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .btn-import {
    height: 40px;
    padding: 0 16px;
    background: var(--ink);
    color: #F5F2EB;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn-import:hover { opacity: 0.85; }

  .import-hint {
    font-size: 0.78rem;
    color: var(--ink3);
    font-family: 'DM Mono', monospace;
  }

  .drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,22,18,0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .drop-overlay.active { display: flex; }

  .drop-box {
    background: var(--surface);
    border: 2px dashed var(--border-strong);
    border-radius: var(--radius);
    padding: 3rem 4rem;
    text-align: center;
  }
  .drop-box .drop-icon { font-size: 2rem; margin-bottom: 0.75rem; }
  .drop-box .drop-title { font-size: 1rem; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .drop-box .drop-sub { font-size: 0.82rem; color: var(--ink3); font-family: 'DM Mono', monospace; }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: #F5F2EB;
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Sledující<br>Moravce</h1>
    <p>Vsázka / vyhodnocení losů</p>
  </div>
  <div class="header-badge">Tip contest</div>
</header>

<main>
  <div class="section-label">Hráči a jejich tipy</div>

  <div class="import-bar">
    <button class="btn-import" onclick="document.getElementById('file-input').click()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 1v8M4 6l3 3 3-3M1 10v1.5A1.5 1.5 0 002.5 13h9A1.5 1.5 0 0013 11.5V10" stroke="#F5F2EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Načíst ze souboru
    </button>
    <span class="import-hint">.xlsx · .xls · .csv — sloupce: Jméno, Tip</span>
    <input type="file" id="file-input" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFileInput(event)" />
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-header-title">Tip na počet sledujících</span>
    </div>
    <div class="players-container">
      <div id="players-list"></div>
      <button class="btn-add" onclick="addPlayer()">+ přidat hráče</button>
    </div>
  </div>

  <div id="chart-section" style="display:none; margin-bottom:1.5rem;">
    <div class="viz-label">Graf tipů</div>
    <div class="chart-card">
      <div class="chart-wrap"><canvas id="tips-chart"></canvas></div>
    </div>
  </div>

  <div class="result-input-card">
    <label for="real-value">Skutečný výsledek:</label>
    <input type="number" id="real-value" placeholder="zadej počet sledujících" oninput="recalculate()" />
  </div>

  <div id="results"></div>
</main>

<div class="drop-overlay" id="drop-overlay">
  <div class="drop-box">
    <div class="drop-icon">📂</div>
    <div class="drop-title">Přetáhni soubor sem</div>
    <div class="drop-sub">.xlsx · .xls · .csv</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let players = [
  { name: "Tomáš", tip: "" },
  { name: "Markéta", tip: "" },
  { name: "Ondřej", tip: "" },
];

let chartInstance = null;

const COLORS = ["#D4402A","#C9920A","#2A7A4A","#378ADD","#7F77DD","#D4537E","#1D9E75","#D85A30"];

function renderPlayers() {
  const list = document.getElementById("players-list");
  list.innerHTML = players.map((p, i) => `
    <div class="player-row">
      <input type="text" placeholder="Jméno hráče" value="${p.name}"
        oninput="players[${i}].name=this.value; recalculate()" />
      <input type="number" placeholder="Tip (číslo)" value="${p.tip}"
        oninput="players[${i}].tip=this.value; recalculate()" />
      <button class="btn-remove" onclick="removePlayer(${i})" title="Odebrat">×</button>
    </div>
  `).join("");
  recalculate();
}

function addPlayer() { players.push({ name: "", tip: "" }); renderPlayers(); }
function removePlayer(i) { players.splice(i, 1); renderPlayers(); }
function fmt(n) { return Math.round(n).toLocaleString("cs-CZ"); }

function recalculate() {
  updateChart();
  updateResults();
}

function getValid() {
  return players.filter(p => p.name && p.tip !== "" && !isNaN(parseFloat(p.tip)))
    .map(p => ({ name: p.name, tip: parseFloat(p.tip) }));
}

function updateChart() {
  const valid = getValid();
  const realVal = parseFloat(document.getElementById("real-value").value);
  const hasReal = !isNaN(realVal);

  if (valid.length < 1) {
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    document.getElementById("chart-section").style.display = "none";
    return;
  }

  document.getElementById("chart-section").style.display = "block";

  // Sort by tip value for visual clarity
  const byTip = [...valid].sort((a, b) => a.tip - b.tip);

  // If real value exists, compute winner for highlight
  let winnerName = null;
  if (hasReal) {
    const withDiff = valid.map(p => ({ ...p, diff: Math.abs(p.tip - realVal) }));
    withDiff.sort((a, b) => a.diff - b.diff);
    winnerName = withDiff[0].name;
  }

  const datasets = [
    {
      label: "Tip hráče",
      data: byTip.map(p => p.tip),
      backgroundColor: byTip.map((p, i) =>
        (winnerName && p.name === winnerName ? "#C9920A" : COLORS[i % COLORS.length]) + "CC"
      ),
      borderColor: byTip.map(p => winnerName && p.name === winnerName ? "#C9920A" : "transparent"),
      borderWidth: 2,
      borderRadius: 6,
      borderSkipped: false,
    }
  ];

  if (hasReal) {
    datasets.push({
      label: "Skutečný výsledek",
      data: Array(byTip.length).fill(realVal),
      type: "line",
      borderColor: "#1A1612",
      borderWidth: 2,
      borderDash: [6, 4],
      pointRadius: 0,
      fill: false,
      tension: 0,
      order: 0,
    });
  }

  const labels = byTip.map(p => p.name);

  if (chartInstance) {
    // Update existing chart in-place for smooth animation
    chartInstance.data.labels = labels;
    chartInstance.data.datasets = datasets;
    chartInstance.update();
  } else {
    chartInstance = new Chart(document.getElementById("tips-chart").getContext("2d"), {
      type: "bar",
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 300 },
        plugins: {
          legend: {
            position: "bottom",
            labels: {
              font: { family: "'Syne', sans-serif", size: 12, weight: "600" },
              color: "#6B6560", boxWidth: 12, boxHeight: 12, padding: 16,
            }
          },
          tooltip: {
            callbacks: {
              label: (ctx) => {
                if (ctx.dataset.type === "line") return ` Skutečnost: ${fmt(ctx.raw)}`;
                const p = byTip[ctx.dataIndex];
                if (hasReal) {
                  const diff = Math.abs(p.tip - realVal);
                  return ` ${p.name}: ${fmt(ctx.raw)} (odch. ${fmt(diff)})`;
                }
                return ` ${p.name}: ${fmt(ctx.raw)}`;
              }
            },
            titleFont: { family: "'Syne', sans-serif", weight: "700" },
            bodyFont: { family: "'DM Mono', monospace", size: 12 },
            backgroundColor: "#1A1612", padding: 12, cornerRadius: 8,
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { font: { family: "'Syne', sans-serif", size: 12, weight: "700" }, color: "#1A1612" },
            border: { display: false }
          },
          y: {
            grid: { color: "rgba(26,22,18,0.06)" },
            ticks: {
              font: { family: "'DM Mono', monospace", size: 11 },
              color: "#A09A92",
              callback: v => v.toLocaleString("cs-CZ"),
            },
            border: { display: false }
          }
        }
      }
    });
  }
}

function updateResults() {
  const realVal = parseFloat(document.getElementById("real-value").value);
  const section = document.getElementById("results");
  const valid = getValid();

  if (valid.length < 2 || isNaN(realVal)) {
    section.innerHTML = valid.length >= 2
      ? `<p class="empty-state">Zadej skutečný výsledek pro vyhodnocení.</p>`
      : `<p class="empty-state">Vyplň tipy alespoň dvou hráčů a skutečný výsledek.</p>`;
    return;
  }

  const ranked = valid.map(p => ({
    ...p,
    diff: Math.abs(p.tip - realVal)
  })).sort((a, b) => a.diff - b.diff);

  const n = ranked.length;

  let html = `
    <div class="winner-card">
      <div class="winner-trophy">🏆</div>
      <div class="winner-info">
        <div class="name">${ranked[0].name} vyhrál!</div>
        <div class="detail">tip: ${fmt(ranked[0].tip)} · odchylka: ${fmt(ranked[0].diff)}</div>
      </div>
    </div>
    <div class="results-list-label">Pořadí a losování</div>
  `;

  ranked.forEach((p, i) => {
    const buys = i, receives = n - 1 - i, net = receives - buys;
    const netClass = net > 0 ? "pill-net-pos" : net < 0 ? "pill-net-neg" : "pill-net-zero";
    const netLabel = net > 0 ? `+${net}` : `${net}`;
    const owesHtml = i > 0
      ? `<div class="owes-row"><span class="owes-to-label">Kupuje los:</span>${ranked.slice(0, i).map(r => `<span class="owes-chip">${r.name}</span>`).join("")}</div>`
      : "";

    html += `
      <div>
        <div class="rank-card">
          <div class="rank-num">${i + 1}.</div>
          <div class="player-details">
            <div class="pname">${p.name}</div>
            <div class="pstats">tip: ${fmt(p.tip)} · odch: ${fmt(p.diff)}</div>
          </div>
          <div class="los-grid">
            <div class="los-pill pill-buys"><span class="num">${buys}</span><span class="lbl">kupuje</span></div>
            <div class="los-pill pill-gets"><span class="num">${receives}</span><span class="lbl">dostane</span></div>
            <div class="los-pill ${netClass}"><span class="num">${netLabel}</span><span class="lbl">bilance</span></div>
          </div>
        </div>
        ${owesHtml}
      </div>
    `;
  });

  // Table
  html += `
    <hr class="section-divider">
    <div class="viz-label">Tabulka výsledků</div>
    <div class="table-card">
      <table class="data-table">
        <thead>
          <tr>
            <th class="td-rank right">#</th>
            <th>Hráč</th>
            <th class="right">Tip</th>
            <th class="right">Skutečnost</th>
            <th class="right">Odchylka</th>
            <th class="right">Kupuje</th>
            <th class="right">Dostane</th>
            <th class="right">Bilance</th>
          </tr>
        </thead>
        <tbody>
  `;

  ranked.forEach((p, i) => {
    const buys = i, receives = n - 1 - i, net = receives - buys;
    const netLabel = net > 0 ? `+${net}` : `${net}`;
    const netBadge = net > 0 ? "badge-green" : net < 0 ? "badge-red" : "badge-gray";
    html += `
      <tr class="${i === 0 ? "winner-row" : ""}">
        <td class="td-rank right">${i + 1}.</td>
        <td><strong>${p.name}</strong></td>
        <td class="td-mono right">${fmt(p.tip)}</td>
        <td class="td-mono right">${fmt(realVal)}</td>
        <td class="td-mono right">${fmt(p.diff)}</td>
        <td class="right">${buys}</td>
        <td class="right">${receives}</td>
        <td class="right"><span class="badge ${netBadge}">${netLabel}</span></td>
      </tr>
    `;
  });

  html += `</tbody></table></div>`;
  section.innerHTML = html;
}

// ── FILE IMPORT ──

function showToast(msg, isError) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isError ? " error" : "");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = "toast"; }, 3000);
}

function handleFileInput(e) {
  const file = e.target.files[0];
  if (file) parseFile(file);
  e.target.value = "";
}

function parseFile(file) {
  const name = file.name.toLowerCase();
  const reader = new FileReader();
  if (name.endsWith(".csv")) {
    reader.onload = (e) => parseCSV(e.target.result);
    reader.readAsText(file, "UTF-8");
  } else {
    reader.onload = (e) => parseXLSX(e.target.result);
    reader.readAsArrayBuffer(file);
  }
}

function parseXLSX(buffer) {
  try {
    const wb = XLSX.read(buffer, { type: "array" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
    importRows(rows);
  } catch (err) {
    showToast("Chyba při čtení souboru.", true);
  }
}

function parseCSV(text) {
  try {
    const rows = text.trim().split(/\r?\n/).map(line =>
      line.split(/[,;	]/).map(c => c.trim().replace(/^["']|["']$/g, ""))
    );
    importRows(rows);
  } catch (err) {
    showToast("Chyba při čtení CSV.", true);
  }
}

function importRows(rows) {
  if (rows.length < 2) { showToast("Soubor je prázdný.", true); return; }

  const header = rows[0].map(h => String(h).toLowerCase().trim());
  let nameCol = -1, tipCol = -1;

  const nameKw = ["jméno", "jmeno", "name", "hráč", "hrac", "player"];
  const tipKw  = ["tip", "tipy", "odhad", "guess", "hodnota", "count", "počet"];

  header.forEach((h, i) => {
    if (nameCol === -1 && nameKw.some(k => h.includes(k))) nameCol = i;
    if (tipCol  === -1 && tipKw.some(k  => h.includes(k))) tipCol  = i;
  });

  if (nameCol === -1) nameCol = 0;
  if (tipCol  === -1) tipCol  = 1;

  const imported = rows.slice(1)
    .map(row => ({
      name: String(row[nameCol] ?? "").trim(),
      tip:  String(row[tipCol]  ?? "").trim()
    }))
    .filter(p => p.name && p.tip !== "" && !isNaN(parseFloat(p.tip)));

  if (imported.length === 0) {
    showToast("Žádná platná data. Zkontroluj sloupce Jméno a Tip.", true);
    return;
  }

  players = imported.map(p => ({ name: p.name, tip: p.tip }));
  renderPlayers();
  showToast("Načteno " + imported.length + " hráčů ✓");
}

// ── DRAG & DROP ──
document.addEventListener("dragover", (e) => {
  e.preventDefault();
  document.getElementById("drop-overlay").classList.add("active");
});
document.addEventListener("dragleave", (e) => {
  if (!e.relatedTarget) document.getElementById("drop-overlay").classList.remove("active");
});
document.addEventListener("drop", (e) => {
  e.preventDefault();
  document.getElementById("drop-overlay").classList.remove("active");
  const file = e.dataTransfer.files[0];
  if (file) parseFile(file);
});

renderPlayers();
</script>
